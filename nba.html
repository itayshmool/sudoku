<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Hardwood Legends · NBA Sudoku</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #080a0d;
      --cell-bg: #0f0d09;
      --cell-given: #161410;
      --box-border: #c8901a;
      --cell-border: #1e1a10;
      --gold: #F0B020;
      --gold-dim: #7a5c10;
      --cream: #F0E0B0;
      --cream-dim: #806820;
      --error: #cc3333;
      --select-bg: rgba(240,176,32,0.18);
      --highlight-bg: rgba(240,176,32,0.05);
      --radius: 6px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      background-image:
        repeating-linear-gradient(91deg, transparent, transparent 58px, rgba(255,200,80,0.018) 58px, rgba(255,200,80,0.018) 59px),
        repeating-linear-gradient(89deg, transparent, transparent 44px, rgba(0,0,0,0.14) 44px, rgba(0,0,0,0.14) 45px),
        radial-gradient(ellipse at 50% 0%, rgba(200,144,26,0.12) 0%, transparent 60%);
      color: var(--cream);
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-bottom: 56px;
    }

    /* ── HEADER ── */
    header {
      width: 100%;
      padding: 18px 16px 14px;
      display: flex;
      flex-direction: column;
      align-items: center;
      border-bottom: 1px solid rgba(200,144,26,0.14);
      position: relative;
    }
    .logo {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 0.24em;
      color: var(--gold);
      line-height: 1;
      text-shadow: 0 0 40px rgba(240,176,32,0.28);
    }
    .logo-sub {
      font-size: 8px;
      letter-spacing: 0.32em;
      color: var(--gold-dim);
      text-transform: uppercase;
      margin-top: 3px;
    }
    .who-btn {
      position: absolute;
      right: 14px;
      top: 50%;
      transform: translateY(-50%);
      border: 1px solid var(--gold-dim);
      color: var(--gold-dim);
      background: none;
      font-family: 'Space Mono', monospace;
      font-size: 7px;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      padding: 6px 9px;
      border-radius: 4px;
      cursor: pointer;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 5px;
      transition: all 0.2s;
      line-height: 1.4;
      text-align: center;
    }
    .who-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(240,176,32,0.07); }

    /* ── DIFFICULTY ── */
    .difficulty { display: flex; gap: 7px; margin-top: 14px; }
    .diff-btn {
      background: none;
      border: 1px solid #1e1a10;
      color: var(--cream-dim);
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      padding: 5px 13px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .diff-btn.active, .diff-btn:hover { border-color: var(--gold); color: var(--gold); background: rgba(240,176,32,0.07); }

    /* ── STATS BAR ── */
    .stats-bar { display: flex; gap: 22px; margin-top: 13px; font-size: 9px; letter-spacing: 0.14em; color: var(--cream-dim); text-transform: uppercase; }
    .stat-val { color: var(--cream); font-weight: 700; }
    .err-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%; background: var(--error); margin-right: 3px; opacity: 0; transition: opacity 0.3s; }
    .err-dot.on { opacity: 1; }

    /* ── GRID ── */
    .grid-wrap { padding: 20px 14px 0; width: 100%; max-width: 416px; }
    #grid {
      display: grid;
      grid-template-columns: repeat(9, 1fr);
      width: 100%;
      aspect-ratio: 1;
      border: 2px solid var(--box-border);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 0 0 1px rgba(200,144,26,0.08), 0 10px 50px rgba(0,0,0,0.7), 0 0 80px rgba(200,144,26,0.04);
    }
    .cell {
      position: relative;
      background: var(--cell-bg);
      border-right: 1px solid var(--cell-border);
      border-bottom: 1px solid var(--cell-border);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      transition: background 0.1s;
    }
    .cell:hover:not(.given):not(.selected) { background: #181410; }
    .cell.given { cursor: default; background: var(--cell-given); }
    .cell.selected { background: var(--select-bg) !important; }
    .cell.highlight { background: var(--highlight-bg) !important; }
    .cell.error { background: rgba(200,40,40,0.15) !important; }
    .cell.same-val { background: rgba(240,176,32,0.09) !important; }
    .cell svg { width: 84%; height: 84%; display: block; pointer-events: none; }

    /* notes grid */
    .notes-g {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      grid-template-rows: repeat(3,1fr);
      width: 100%; height: 100%;
      position: absolute; inset: 0;
      padding: 1px;
    }
    .note-s {
      display: flex; align-items: center; justify-content: center;
      font-size: 6px; color: var(--gold-dim); font-weight: 700; line-height: 1;
    }

    /* ── ICON PICKER ── */
    .picker-wrap {
      display: grid;
      grid-template-columns: repeat(9,1fr);
      gap: 5px;
      padding: 16px 14px 0;
      max-width: 416px;
      width: 100%;
    }
    .icon-btn {
      background: var(--cell-bg);
      border: 1px solid #1e1a10;
      border-radius: 7px;
      aspect-ratio: 1;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; padding: 3px;
      transition: all 0.15s;
    }
    .icon-btn:hover { border-color: var(--gold-dim); background: #181410; }
    .icon-btn.active { border-color: var(--gold); background: rgba(240,176,32,0.1); box-shadow: 0 0 10px rgba(240,176,32,0.18); }
    .icon-btn svg { width: 100%; height: 100%; display: block; pointer-events: none; }

    /* ── CONTROLS ── */
    .controls {
      display: flex; gap: 8px;
      padding: 14px 14px 0;
      max-width: 416px; width: 100%;
    }
    .ctrl-btn {
      flex: 1;
      background: none;
      border: 1px solid #1e1a10;
      color: var(--cream-dim);
      font-family: 'Space Mono', monospace;
      font-size: 8px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      padding: 9px 4px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.2s;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }
    .ctrl-btn:hover { border-color: var(--gold-dim); color: var(--cream); }
    .ctrl-btn.active { border-color: var(--gold); color: var(--gold); background: rgba(240,176,32,0.07); }

    /* ── NEW GAME BTN ── */
    .new-game {
      margin-top: 18px;
      background: var(--gold);
      border: none;
      color: #0a0800;
      font-family: 'Bebas Neue', sans-serif;
      font-size: 17px;
      letter-spacing: 0.22em;
      padding: 11px 38px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 4px 20px rgba(240,176,32,0.22);
    }
    .new-game:hover { background: #ffc428; box-shadow: 0 6px 28px rgba(240,176,32,0.38); transform: translateY(-1px); }

    /* ── VICTORY SCREEN ── */
    #victory {
      display: none; position: fixed; inset: 0;
      background: rgba(6,8,10,0.97);
      z-index: 100;
      flex-direction: column; align-items: center; justify-content: center; gap: 14px;
    }
    #victory.show { display: flex; }
    .v-trophy { font-size: 48px; animation: trophy-bounce 1.2s ease-in-out infinite; }
    @keyframes trophy-bounce { 0%,100%{transform:translateY(0) rotate(-4deg);} 50%{transform:translateY(-8px) rotate(4deg);} }
    .v-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 50px; letter-spacing: 0.18em; color: var(--gold);
      text-shadow: 0 0 60px rgba(240,176,32,0.5);
      animation: glow-pulse 2s ease-in-out infinite;
    }
    @keyframes glow-pulse { 0%,100%{text-shadow:0 0 40px rgba(240,176,32,0.4);} 50%{text-shadow:0 0 80px rgba(240,176,32,0.8),0 0 120px rgba(240,176,32,0.3);} }
    .v-sub { font-size: 9px; letter-spacing: 0.28em; color: var(--gold-dim); text-transform: uppercase; }
    .v-stats { font-size: 10px; color: var(--cream-dim); letter-spacing: 0.12em; text-transform: uppercase; text-align: center; line-height: 2.2; }
    .v-stats strong { color: var(--cream); }
    .v-actions { display: flex; flex-direction: column; align-items: center; gap: 10px; margin-top: 6px; }
    .v-secondary { font-size: 8px; letter-spacing: 0.2em; color: var(--gold-dim); text-transform: uppercase; text-decoration: none; transition: color 0.2s; }
    .v-secondary:hover { color: var(--gold); }

    /* confetti */
    .confetti {
      position: fixed; pointer-events: none;
      animation: confetti-fall linear forwards;
    }
    @keyframes confetti-fall {
      0% { transform: translateY(-60px) rotate(0deg) scale(0.4); opacity: 0; }
      8% { opacity: 1; }
      90% { opacity: 0.9; }
      100% { transform: translateY(110vh) rotate(600deg) scale(1.1); opacity: 0; }
    }

    /* ── ANIMATIONS ── */
    @keyframes pop-in { 0%{transform:scale(0.2);opacity:0;} 65%{transform:scale(1.12);} 100%{transform:scale(1);opacity:1;} }
    .pop { animation: pop-in 0.22s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    @keyframes shake-x { 0%,100%{transform:translateX(0);} 25%{transform:translateX(-4px);} 75%{transform:translateX(4px);} }
    .shake { animation: shake-x 0.26s ease-in-out; }
  </style>
</head>
<body>

<header>
  <div class="logo">Hardwood Legends</div>
  <div class="logo-sub">NBA Sudoku · 9 Icons · Classic Game</div>
  <a href="nba-legends.html" class="who-btn">🏀<br>Who's<br>Who?</a>
  <div class="difficulty">
    <button class="diff-btn" data-diff="easy">Easy</button>
    <button class="diff-btn active" data-diff="medium">Medium</button>
    <button class="diff-btn" data-diff="hard">Hard</button>
  </div>
  <div class="stats-bar">
    <span><span class="err-dot" id="err-dot"></span>Errors <span class="stat-val" id="err-count">0</span></span>
    <span>Time <span class="stat-val" id="timer">0:00</span></span>
    <span>Hints <span class="stat-val" id="hint-count">3</span></span>
  </div>
</header>

<div class="grid-wrap">
  <div id="grid"></div>
</div>

<div class="picker-wrap" id="picker"></div>

<div class="controls">
  <button class="ctrl-btn" id="notes-btn" onclick="toggleNotes()">✏ Notes</button>
  <button class="ctrl-btn" onclick="erase()">⌫ Erase</button>
  <button class="ctrl-btn" onclick="useHint()">💡 Hint</button>
</div>

<button class="new-game" onclick="newGame()">New Game</button>

<div id="victory">
  <div class="v-trophy">🏆</div>
  <div class="v-title">Championship!</div>
  <div class="v-sub">Hardwood Legends Complete</div>
  <div class="v-stats" id="v-stats"></div>
  <div class="v-actions">
    <button class="new-game" onclick="closeVictory()">Play Again</button>
    <a href="nba-legends.html" class="v-secondary">Meet the Legends →</a>
  </div>
</div>

// ─────────────────────────────────────────────
// STATE
// ─────────────────────────────────────────────
const S = {
  board: [],      // { val, given, notes: Set, error }
  solution: [],
  selected: -1,
  notesMode: false,
  activeIcon: 0,
  difficulty: 'medium',
  errors: 0,
  hints: 3,
  startTime: null,
  timerInterval: null,
  complete: false
};

// ─────────────────────────────────────────────
// SUDOKU ENGINE
// ─────────────────────────────────────────────
function shuffle(a) {
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}
function valid(board, pos, num) {
  const r = Math.floor(pos / 9), c = pos % 9;
  for (let i = 0; i < 9; i++) {
    if (board[r * 9 + i] === num || board[i * 9 + c] === num) return false;
  }
  const br = Math.floor(r / 3) * 3, bc = Math.floor(c / 3) * 3;
  for (let dr = 0; dr < 3; dr++) for (let dc = 0; dc < 3; dc++)
    if (board[(br + dr) * 9 + (bc + dc)] === num) return false;
  return true;
}
function fill(board) {
  const pos = board.indexOf(0);
  if (pos === -1) return true;
  for (const n of shuffle([1,2,3,4,5,6,7,8,9])) {
    if (valid(board, pos, n)) {
      board[pos] = n;
      if (fill(board)) return true;
      board[pos] = 0;
    }
  }
  return false;
}
function generate(diff) {
  const sol = Array(81).fill(0);
  fill(sol);
  const puz = [...sol];
  const clues = { easy: 45, medium: 32, hard: 26 }[diff];
  const positions = shuffle([...Array(81).keys()]);
  for (let i = 0; i < 81 - clues; i++) puz[positions[i]] = 0;
  return { puz, sol };
}

// ─────────────────────────────────────────────
// RENDER
// ─────────────────────────────────────────────
function buildGrid() {
  const el = document.getElementById('grid');
  el.innerHTML = '';
  S.board.forEach((_, i) => {
    const div = document.createElement('div');
    div.className = 'cell';
    div.dataset.i = i;
    div.addEventListener('click', () => selectCell(i));
    // Box borders
    const r = Math.floor(i / 9), c = i % 9;
    if (c % 3 === 2 && c !== 8) div.style.borderRight = '2px solid var(--box-border)';
    if (r % 3 === 2 && r !== 8) div.style.borderBottom = '2px solid var(--box-border)';
    if (c === 8) div.style.borderRight = 'none';
    if (r === 8) div.style.borderBottom = 'none';
    el.appendChild(div);
  });
  renderGrid();
}

function renderGrid() {
  const cells = document.querySelectorAll('.cell');
  const sv = S.selected !== -1 ? S.board[S.selected].val : 0;
  S.board.forEach((cell, i) => {
    const el = cells[i];
    const br = el.style.borderRight, bb = el.style.borderBottom;
    let cls = 'cell';
    if (cell.given) cls += ' given';
    if (cell.error) cls += ' error';
    if (i === S.selected) cls += ' selected';
    else if (isHighlight(i)) cls += ' highlight';
    else if (sv && cell.val === sv && !cell.error) cls += ' same-val';
    el.className = cls;
    el.style.borderRight = br;
    el.style.borderBottom = bb;
    el.innerHTML = '';
    if (cell.val) {
      el.innerHTML = ICONS.svgs[cell.val - 1];
    } else if (cell.notes.size) {
      const ng = document.createElement('div');
      ng.className = 'notes-g';
      for (let n = 1; n <= 9; n++) {
        const s = document.createElement('div');
        s.className = 'note-s';
        s.textContent = cell.notes.has(n) ? ICONS.notes[n - 1] : '';
        ng.appendChild(s);
      }
      el.appendChild(ng);
    }
  });
}

function isHighlight(i) {
  if (S.selected === -1) return false;
  const sr = Math.floor(S.selected / 9), sc = S.selected % 9;
  const ir = Math.floor(i / 9), ic = i % 9;
  return sr === ir || sc === ic ||
    (Math.floor(sr/3) === Math.floor(ir/3) && Math.floor(sc/3) === Math.floor(ic/3));
}

// ─────────────────────────────────────────────
// PICKER
// ─────────────────────────────────────────────
function buildPicker() {
  const el = document.getElementById('picker');
  el.innerHTML = '';
  ICONS.svgs.forEach((svg, i) => {
    const btn = document.createElement('button');
    btn.className = 'icon-btn' + (i === S.activeIcon ? ' active' : '');
    btn.innerHTML = svg;
    btn.title = ICONS.names[i];
    btn.addEventListener('click', () => {
      S.activeIcon = i;
      document.querySelectorAll('.icon-btn').forEach((b, j) => b.classList.toggle('active', j === i));
      if (S.selected !== -1) place(i + 1);
    });
    el.appendChild(btn);
  });
}

// ─────────────────────────────────────────────
// INTERACTIONS
// ─────────────────────────────────────────────
function selectCell(i) {
  S.selected = i;
  renderGrid();
}

function place(val) {
  if (S.selected === -1 || S.complete) return;
  const cell = S.board[S.selected];
  if (cell.given) return;
  const el = document.querySelector(`.cell[data-i="${S.selected}"]`);

  if (S.notesMode) {
    cell.val = 0; cell.error = false;
    if (cell.notes.has(val)) cell.notes.delete(val);
    else cell.notes.add(val);
  } else {
    cell.notes.clear();
    if (cell.val === val) {
      cell.val = 0; cell.error = false;
    } else {
      cell.val = val;
      const correct = S.solution[S.selected] === val;
      cell.error = !correct;
      if (!correct) {
        S.errors++;
        document.getElementById('err-count').textContent = S.errors;
        document.getElementById('err-dot').classList.add('on');
        el?.classList.add('shake');
        setTimeout(() => el?.classList.remove('shake'), 300);
      } else {
        cell.error = false;
        el?.classList.add('pop');
        setTimeout(() => el?.classList.remove('pop'), 240);
        checkComplete();
      }
    }
  }
  renderGrid();
}

function toggleNotes() {
  S.notesMode = !S.notesMode;
  document.getElementById('notes-btn').classList.toggle('active', S.notesMode);
}

function erase() {
  if (S.selected === -1) return;
  const cell = S.board[S.selected];
  if (cell.given) return;
  cell.val = 0; cell.notes.clear(); cell.error = false;
  renderGrid();
}

function useHint() {
  if (S.hints <= 0 || S.selected === -1 || S.complete) return;
  const cell = S.board[S.selected];
  if (cell.given || cell.val === S.solution[S.selected]) return;
  S.hints--;
  document.getElementById('hint-count').textContent = S.hints;
  cell.val = S.solution[S.selected];
  cell.error = false; cell.notes.clear(); cell.given = true;
  const el = document.querySelector(`.cell[data-i="${S.selected}"]`);
  el?.classList.add('pop');
  setTimeout(() => el?.classList.remove('pop'), 240);
  renderGrid();
  checkComplete();
}

// ─────────────────────────────────────────────
// COMPLETION
// ─────────────────────────────────────────────
function checkComplete() {
  if (!S.board.every(c => c.val && !c.error)) return;
  S.complete = true;
  clearInterval(S.timerInterval);
  const sec = Math.floor((Date.now() - S.startTime) / 1000);
  const m = Math.floor(sec / 60), s = sec % 60;
  setTimeout(() => showVictory(m, s), 450);
}

function showVictory(m, s) {
  document.getElementById('v-stats').innerHTML =
    `Time: <strong>${m}:${String(s).padStart(2,'0')}</strong> &nbsp;·&nbsp; Errors: <strong>${S.errors}</strong><br>Difficulty: <strong>${S.difficulty.toUpperCase()}</strong>`;
  document.getElementById('victory').classList.add('show');
  spawnConfetti();
}

function closeVictory() {
  document.getElementById('victory').classList.remove('show');
  newGame();
}

function spawnConfetti() {
  const screen = document.getElementById('victory');
  for (let i = 0; i < 20; i++) {
    setTimeout(() => {
      const div = document.createElement('div');
      div.className = 'confetti';
      const idx = Math.floor(Math.random() * 9);
      div.innerHTML = ICONS.svgs[idx];
      const sz = 20 + Math.random() * 22;
      div.style.cssText = `left:${Math.random()*100}vw;width:${sz}px;height:${sz}px;animation-duration:${2.4+Math.random()*2}s`;
      screen.appendChild(div);
      setTimeout(() => div.remove(), 5000);
    }, i * 160);
  }
}

// ─────────────────────────────────────────────
// TIMER
// ─────────────────────────────────────────────
function startTimer() {
  clearInterval(S.timerInterval);
  S.startTime = Date.now();
  S.timerInterval = setInterval(() => {
    const sec = Math.floor((Date.now() - S.startTime) / 1000);
    const m = Math.floor(sec / 60), s = sec % 60;
    document.getElementById('timer').textContent = `${m}:${String(s).padStart(2,'0')}`;
  }, 1000);
}

// ─────────────────────────────────────────────
// NEW GAME
// ─────────────────────────────────────────────
function newGame() {
  clearInterval(S.timerInterval);
  const { puz, sol } = generate(S.difficulty);
  S.board = puz.map(v => ({ val: v, given: v !== 0, notes: new Set(), error: false }));
  S.solution = sol;
  S.selected = -1; S.notesMode = false;
  S.errors = 0; S.hints = 3; S.complete = false; S.activeIcon = 0;
  document.getElementById('err-count').textContent = '0';
  document.getElementById('err-dot').classList.remove('on');
  document.getElementById('notes-btn').classList.remove('active');
  document.getElementById('hint-count').textContent = '3';
  buildGrid();
  buildPicker();
  startTimer();
}

// ─────────────────────────────────────────────
// DIFFICULTY
// ─────────────────────────────────────────────
document.querySelectorAll('.diff-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.diff-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    S.difficulty = btn.dataset.diff;
    newGame();
  });
});

// ─────────────────────────────────────────────
// KEYBOARD
// ─────────────────────────────────────────────
document.addEventListener('keydown', e => {
  if (S.selected === -1) return;
  const n = parseInt(e.key);
  if (n >= 1 && n <= 9) {
    S.activeIcon = n - 1;
    document.querySelectorAll('.icon-btn').forEach((b, i) => b.classList.toggle('active', i === S.activeIcon));
    place(n);
  }
  if (e.key === 'Backspace' || e.key === 'Delete') erase();
  if (e.key === 'n' || e.key === 'N') toggleNotes();
  const dirs = { ArrowUp: -9, ArrowDown: 9, ArrowLeft: -1, ArrowRight: 1 };
  if (dirs[e.key] !== undefined) {
    e.preventDefault();
    const next = S.selected + dirs[e.key];
    if (next >= 0 && next < 81) selectCell(next);
  }
});

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
newGame();
</script>
</body>
</html>
