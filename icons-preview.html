<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Icon Preview — Naughty Sudoku</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
  <style>
    body {
      background: #080808;
      color: #eeeeee;
      font-family: 'Space Mono', monospace;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 40px 16px;
    }
    h1 {
      font-family: 'Playfair Display', serif;
      color: #c9a96e;
      letter-spacing: 0.2em;
      font-size: 26px;
      margin-bottom: 8px;
    }
    p {
      color: #555;
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 40px;
    }
    .grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 24px;
      max-width: 420px;
      width: 100%;
    }
    .icon-card {
      background: #111;
      border: 1px solid #2a2a2a;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px 12px 14px;
      gap: 12px;
      transition: border-color 0.2s, transform 0.2s;
      cursor: default;
    }
    .icon-card:hover {
      border-color: #c9a96e;
      transform: scale(1.04);
    }
    .icon-card svg {
      width: 90px;
      height: 90px;
      filter: drop-shadow(0 4px 12px rgba(201,169,110,0.15));
    }
    .icon-name {
      font-size: 9px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: #c9a96e;
      text-align: center;
    }
    .badge {
      display: inline-block;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 3px;
      padding: 2px 8px;
      font-size: 9px;
      color: #555;
      letter-spacing: 0.1em;
      margin-bottom: 6px;
    }
  </style>
</head>
<body>

<h1>The Naughty Nine</h1>
<p>Icon candidates for adult sudoku</p>

<div class="grid">

  <!-- 1. Willy -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <!-- Shaft -->
      <rect x="23" y="30" width="18" height="28" rx="9" fill="#FFB3C1"/>
      <!-- Glans -->
      <ellipse cx="32" cy="24" rx="13" ry="14" fill="#FF8FA3"/>
      <!-- Glans highlight -->
      <ellipse cx="27" cy="18" rx="5" ry="4" fill="#FFCCD5" opacity="0.7"/>
      <!-- Coronal ridge shadow -->
      <path d="M19 32 Q32 40 45 32" stroke="#FF7090" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Eyes -->
      <circle cx="27" cy="21" r="2.5" fill="#2a1a1a"/>
      <circle cx="37" cy="21" r="2.5" fill="#2a1a1a"/>
      <circle cx="27.8" cy="20.2" r="0.9" fill="white"/>
      <circle cx="37.8" cy="20.2" r="0.9" fill="white"/>
      <!-- Smile -->
      <path d="M27 27 Q32 31.5 37 27" stroke="#CC4466" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <!-- Blush -->
      <ellipse cx="19" cy="24" rx="4" ry="3" fill="#FF7090" opacity="0.45"/>
      <ellipse cx="45" cy="24" rx="4" ry="3" fill="#FF7090" opacity="0.45"/>
    </svg>
    <div class="badge">#1</div>
    <div class="icon-name">Willy</div>
  </div>

  <!-- 2. Boobies -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <!-- Left boob -->
      <circle cx="20" cy="36" r="17" fill="#FFD5B8"/>
      <!-- Right boob -->
      <circle cx="44" cy="36" r="17" fill="#FFD5B8"/>
      <!-- Chest shadow/cleavage base -->
      <path d="M10 52 Q20 58 32 53 Q44 58 54 52" stroke="#FFBF99" stroke-width="2" fill="none"/>
      <!-- Cleavage line -->
      <path d="M32 24 Q32 38 32 44" stroke="#FFBF99" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Left nipple -->
      <circle cx="18" cy="30" r="4" fill="#FFAA80"/>
      <circle cx="18" cy="30" r="2.2" fill="#FF8A55"/>
      <circle cx="16.5" cy="28.8" r="0.8" fill="#FFCCA8" opacity="0.8"/>
      <!-- Right nipple -->
      <circle cx="46" cy="30" r="4" fill="#FFAA80"/>
      <circle cx="46" cy="30" r="2.2" fill="#FF8A55"/>
      <circle cx="44.5" cy="28.8" r="0.8" fill="#FFCCA8" opacity="0.8"/>
      <!-- Highlights -->
      <ellipse cx="14" cy="28" rx="5" ry="4" fill="white" opacity="0.22"/>
      <ellipse cx="40" cy="28" rx="5" ry="4" fill="white" opacity="0.22"/>
    </svg>
    <div class="badge">#2</div>
    <div class="icon-name">Boobies</div>
  </div>

  <!-- 3. Booty -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <!-- Left cheek -->
      <circle cx="20" cy="34" r="18" fill="#FFD5B8"/>
      <!-- Right cheek -->
      <circle cx="44" cy="34" r="18" fill="#FFD5B8"/>
      <!-- Clip bottom to frame -->
      <rect x="0" y="56" width="64" height="10" fill="#080808"/>
      <!-- Crack line -->
      <path d="M32 10 Q30 28 32 46 Q34 54 32 62" stroke="#FFBF99" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Highlights -->
      <ellipse cx="14" cy="26" rx="6" ry="5" fill="white" opacity="0.2"/>
      <ellipse cx="50" cy="26" rx="6" ry="5" fill="white" opacity="0.2"/>
      <!-- Shadow between cheeks top -->
      <path d="M26 12 Q32 18 38 12" stroke="#FFBF99" stroke-width="1.5" fill="none"/>
    </svg>
    <div class="badge">#3</div>
    <div class="icon-name">Booty</div>
  </div>

  <!-- 4. Lady Bits (stylised flower/butterfly) -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <!-- Outer lips - left -->
      <ellipse cx="26" cy="32" rx="12" ry="20" fill="#FF9EB5" opacity="0.6"/>
      <!-- Outer lips - right -->
      <ellipse cx="38" cy="32" rx="12" ry="20" fill="#FF9EB5" opacity="0.6"/>
      <!-- Inner lips -->
      <ellipse cx="29" cy="32" rx="7" ry="14" fill="#FF7096"/>
      <ellipse cx="35" cy="32" rx="7" ry="14" fill="#FF7096"/>
      <!-- Centre -->
      <ellipse cx="32" cy="32" rx="4" ry="10" fill="#FF4D77"/>
      <!-- Hood top -->
      <path d="M24 18 Q32 12 40 18 Q36 24 32 22 Q28 24 24 18Z" fill="#FF7096"/>
      <!-- Highlight -->
      <ellipse cx="29" cy="22" rx="3" ry="4" fill="white" opacity="0.25"/>
      <!-- Little wink star -->
      <text x="48" y="18" font-size="10" fill="#FF9EB5" opacity="0.8">✿</text>
    </svg>
    <div class="badge">#4</div>
    <div class="icon-name">Lady Bits</div>
  </div>

  <!-- 5. The Boys -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <!-- Left ball -->
      <ellipse cx="21" cy="36" rx="17" ry="16" fill="#FFD5B8"/>
      <!-- Right ball -->
      <ellipse cx="43" cy="36" rx="17" ry="16" fill="#FFBF99"/>
      <!-- Seam line -->
      <path d="M32 20 Q30 32 32 52 Q34 32 32 20" stroke="#FFBF99" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Left: eyes -->
      <circle cx="17" cy="32" r="2.2" fill="#2a1a1a"/>
      <circle cx="25" cy="32" r="2.2" fill="#2a1a1a"/>
      <circle cx="17.7" cy="31.3" r="0.8" fill="white"/>
      <circle cx="25.7" cy="31.3" r="0.8" fill="white"/>
      <!-- Left: smile -->
      <path d="M17 37 Q21 41 25 37" stroke="#CC7755" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Right: sleepy face -->
      <path d="M38 32 Q42 30 46 32" stroke="#2a1a1a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
      <path d="M39 38 Q43 42 47 38" stroke="#CC7755" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Highlights -->
      <ellipse cx="15" cy="28" rx="4" ry="3.5" fill="white" opacity="0.2"/>
      <ellipse cx="40" cy="28" rx="4" ry="3.5" fill="white" opacity="0.2"/>
    </svg>
    <div class="badge">#5</div>
    <div class="icon-name">The Boys</div>
  </div>

  <!-- 6. Eggplant -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <!-- Body -->
      <ellipse cx="32" cy="38" rx="18" ry="22" fill="#8B4FB5"/>
      <!-- Tip bottom -->
      <ellipse cx="32" cy="57" rx="5" ry="4" fill="#7A3FA0"/>
      <!-- Body highlight -->
      <ellipse cx="24" cy="28" rx="7" ry="10" fill="#A668CC" opacity="0.5"/>
      <!-- Leaf cap -->
      <path d="M32 18 Q20 8 18 16 Q24 12 32 18Z" fill="#4CAF50"/>
      <path d="M32 18 Q44 8 46 16 Q40 12 32 18Z" fill="#66BB6A"/>
      <path d="M32 18 Q32 4 36 8 Q34 12 32 18Z" fill="#4CAF50"/>
      <!-- Stem -->
      <line x1="32" y1="18" x2="32" y2="10" stroke="#388E3C" stroke-width="2.5" stroke-linecap="round"/>
      <!-- Winking eye -->
      <path d="M26 36 Q29 34 32 36" stroke="#5C2A8A" stroke-width="2" fill="none" stroke-linecap="round"/>
      <circle cx="36" cy="36" r="2.5" fill="#5C2A8A"/>
      <circle cx="36.7" cy="35.3" r="0.8" fill="white"/>
      <!-- Smile -->
      <path d="M26 43 Q32 48 38 43" stroke="#5C2A8A" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Blush -->
      <ellipse cx="22" cy="40" rx="4" ry="3" fill="#CC88DD" opacity="0.4"/>
      <ellipse cx="42" cy="40" rx="4" ry="3" fill="#CC88DD" opacity="0.4"/>
    </svg>
    <div class="badge">#6</div>
    <div class="icon-name">Eggplant</div>
  </div>

  <!-- 7. Peach -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <!-- Peach body -->
      <circle cx="32" cy="36" r="22" fill="#FFAA6E"/>
      <!-- Peach blush / colour variation -->
      <ellipse cx="42" cy="30" rx="14" ry="16" fill="#FF8A5B" opacity="0.4"/>
      <!-- Crease / crack -->
      <path d="M32 14 Q29 24 32 36 Q35 46 32 58" stroke="#FF7044" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- Highlight -->
      <ellipse cx="22" cy="24" rx="7" ry="6" fill="white" opacity="0.22"/>
      <!-- Leaf -->
      <path d="M28 14 Q20 4 14 10 Q22 8 28 14Z" fill="#66BB6A"/>
      <path d="M36 12 Q38 2 44 6 Q38 6 36 12Z" fill="#4CAF50"/>
      <!-- Stem -->
      <path d="M32 14 Q33 8 30 4" stroke="#5D4037" stroke-width="2" fill="none" stroke-linecap="round"/>
      <!-- little face -->
      <circle cx="26" cy="36" r="2" fill="#FF7044" opacity="0.5"/>
      <circle cx="38" cy="36" r="2" fill="#FF7044" opacity="0.5"/>
      <path d="M27 42 Q32 46 37 42" stroke="#E64A19" stroke-width="1.5" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="badge">#7</div>
    <div class="icon-name">Peachy</div>
  </div>

  <!-- 8. Banana -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <!-- Banana body -->
      <path d="M14 50 Q10 28 20 16 Q30 6 48 12 Q52 14 50 18 Q36 14 28 22 Q18 32 20 52 Z" fill="#FFE135"/>
      <!-- Inner curve (lighter) -->
      <path d="M20 50 Q16 32 24 22 Q32 14 48 18" stroke="#FFF176" stroke-width="5" fill="none" stroke-linecap="round"/>
      <!-- Tip top (brown) -->
      <ellipse cx="48" cy="15" rx="5" ry="4" fill="#795548" transform="rotate(-20 48 15)"/>
      <!-- Tip bottom (brown) -->
      <ellipse cx="17" cy="51" rx="5" ry="4" fill="#795548" transform="rotate(70 17 51)"/>
      <!-- Shadow edge -->
      <path d="M14 50 Q10 28 20 16 Q30 6 48 12" stroke="#F9A825" stroke-width="2" fill="none"/>
      <!-- Eyes on banana -->
      <circle cx="36" cy="28" r="2.2" fill="#5D4037"/>
      <circle cx="28" cy="34" r="2.2" fill="#5D4037"/>
      <circle cx="36.7" cy="27.3" r="0.7" fill="white"/>
      <circle cx="28.7" cy="33.3" r="0.7" fill="white"/>
      <!-- Smile -->
      <path d="M28 40 Q32 44 36 40" stroke="#F57F17" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </svg>
    <div class="badge">#8</div>
    <div class="icon-name">Banana</div>
  </div>

  <!-- 9. Cherry -->
  <div class="icon-card">
    <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <!-- Stems -->
      <path d="M20 42 Q22 26 32 20 Q42 26 44 42" stroke="#5D4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <path d="M32 20 Q32 12 34 8" stroke="#5D4037" stroke-width="2.5" fill="none" stroke-linecap="round"/>
      <!-- Leaf -->
      <path d="M34 8 Q42 4 44 12 Q38 10 34 8Z" fill="#4CAF50"/>
      <!-- Left cherry -->
      <circle cx="18" cy="46" r="14" fill="#C0392B"/>
      <ellipse cx="14" cy="40" rx="5" ry="4" fill="#E74C3C" opacity="0.6"/>
      <circle cx="13" cy="39" r="3" fill="white" opacity="0.25"/>
      <!-- Right cherry -->
      <circle cx="46" cy="46" r="14" fill="#922B21"/>
      <ellipse cx="42" cy="40" rx="5" ry="4" fill="#C0392B" opacity="0.6"/>
      <circle cx="41" cy="39" r="3" fill="white" opacity="0.25"/>
      <!-- Left: wink + smile -->
      <path d="M14 44 Q17 42 20 44" stroke="#7B241C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <circle cx="14" cy="48" r="1.5" fill="#7B241C"/>
      <circle cx="21" cy="48" r="1.5" fill="#7B241C"/>
      <path d="M14 51 Q17.5 54 21 51" stroke="#7B241C" stroke-width="1.5" fill="none" stroke-linecap="round"/>
      <!-- Right: surprised face -->
      <circle cx="42" cy="44" r="1.8" fill="#641E16"/>
      <circle cx="49" cy="44" r="1.8" fill="#641E16"/>
      <ellipse cx="45.5" cy="50" rx="3" ry="2.5" fill="#641E16"/>
    </svg>
    <div class="badge">#9</div>
    <div class="icon-name">Cherry</div>
  </div>

</div>

<div style="margin-top: 40px; text-align: center; color: #333; font-size: 9px; letter-spacing: 0.2em; text-transform: uppercase;">
  Reply with feedback — adjust any icons before the game is built
</div>

</body>
</html>
